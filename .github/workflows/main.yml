```yaml id="u3m7qa"
name: Multi-Registry CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Docker Hub 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # Docker 이미지 빌드
    - name: Build Docker Image
      run: |
        docker build \
          -t leeeungmin/test-web-app:${{ github.sha }} \
          -t leeeungmin/test-web-app:latest \
          .

    # Docker Hub Push 먼저
    - name: Push to Docker Hub
      run: |
        docker push leeeungmin/test-web-app:${{ github.sha }}
        docker push leeeungmin/test-web-app:latest

    # 그 다음 ACR 로그인
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    # ACR 태깅
    - name: Tag for ACR
      run: |
        docker tag \
          leeeungmin/test-web-app:${{ github.sha }} \
          ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/test-web-app:${{ github.sha }}

    # ACR Push
    - name: Push to ACR
      run: |
        docker push \
          ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/test-web-app:${{ github.sha }}

    # Azure Web App Deploy
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'st714webapp'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: '${{ secrets.REGISTRY_USERNAME }}.azurecr.io/test-web-app:${{ github.sha }}'
```
