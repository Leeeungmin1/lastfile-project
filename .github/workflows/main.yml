name: Build and Push

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to Azure ACR
        uses: docker/login-action@v3
        with:
          registry: st714acr.azurecr.io
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push
        run: |
          docker build -t leeeungmin/test-web-app:latest -t st714acr.azurecr.io/test-web-app:latest .
          docker push leeeungmin/test-web-app:latest
          docker push st714acr.azurecr.io/test-web-app:latest