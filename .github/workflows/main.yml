name: Multi-Registry CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Docker Hub 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Azure Container Registry(ACR) 로그인
    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ secrets.REGISTRY_USERNAME }}.azurecr.io
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    # 3. Docker 이미지 빌드 및 멀티 Push (표준화된 멀티 태그 스크립트)
    - name: Build and Push to Both Registries
      run: |
        # 1. 동일한 이미지에 Docker Hub와 ACR 태그를 각각 붙여 빌드
        docker build \
          -t docker.io/leeeungmin1/test-web-app:${{ github.sha }} \
          -t ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/test-web-app:${{ github.sha }} .
        
        # 2. Docker Hub로 push (leeeungmin1은 소문자 처리 안전 보장)
        docker push docker.io/leeeungmin1/test-web-app:${{ github.sha }}
        
        # 3. Azure ACR로 push
        docker push ${{ secrets.REGISTRY_USERNAME }}.azurecr.io/test-web-app:${{ github.sha }}
    # 4. Azure App Service에 자동 배포
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: 'st714webapp'
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        images: '${{ secrets.REGISTRY_USERNAME }}.azurecr.io/test-web-app:${{ github.sha }}'